name: CI

on:
  push:
    branches: [main]
    tags-ignore:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🔨 Compile
        run: npm run compile

      - name: 📦 Package VSIX
        run: npx vsce package --no-dependencies

      - name: 📤 Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: turbo-approve-vsix
          path: "*.vsix"
          retention-days: 7
